    <main>
        <h2>LLB Subjects</h2>
        <div class="semester">
            <h3>Semester 1</h3>
            <div class="subjects">
                <div class="subject-box">
                    <p>Constitutional Law</p>
                    <input type="file" id="upload1" accept=".pdf">
                    <button onclick="uploadFile('upload1', 'list1')">Upload PDF</button>
                    <ul id="list1"></ul>
                </div>
                <div class="subject-box">
                    <p>Criminal Law</p>
                    <input type="file" id="upload2" accept=".pdf">
                    <button onclick="uploadFile('upload2', 'list2')">Upload PDF</button>
                    <ul id="list2"></ul>
                </div>
                <div class="subject-box">
                    <p>Civil Law</p>
                    <input type="file" id="upload3" accept=".pdf">
                    <button onclick="uploadFile('upload3', 'list3')">Upload PDF</button>
                    <ul id="list3"></ul>
                </div>
                <div class="subject-box">
                    <p>Corporate Law</p>
                    <input type="file" id="upload4" accept=".pdf">
                    <button onclick="uploadFile('upload4', 'list4')">Upload PDF</button>
                    <ul id="list4"></ul>

            </div>
